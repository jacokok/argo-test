apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: "https://github.com/cloudnative-pg/artifacts.git"
    targetRevision: "release-1.23"
    path: manifests/
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cnpg-system # The operator runs in its own namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true # Crucial for large Operator CRDs
      - CreateNamespace=true
