apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: postgres
spec:
  project: default
  source:
    repoURL: https://github.com/jacokok/argo-test
    targetRevision: HEAD
    path: postgres
  destination:
    server: "https://kubernetes.default.svc"
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
