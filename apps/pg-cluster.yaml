apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pg-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/jacokok/argo-test
    targetRevision: HEAD
    path: postgres/cluster
  destination:
    server: "https://kubernetes.default.svc"
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
