apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: 1Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster-new-5
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  postgresql:
    shared_preload_libraries:
      - pg_cron
    parameters:
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
      cron.database_name: "postgres"
  storage:
    size: 1Gi
  managed:
    roles:
      - name: club
        ensure: present
        login: true
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
        - CREATE EXTENSION IF NOT EXISTS pg_cron;
      import:
        type: monolith
        databases:
          - "*"
        roles:
          - "*"
        source:
          externalCluster: club
        pgRestoreExtraOptions:
          - "--no-owner"
          - "--no-privileges"
  externalClusters:
    - name: club
      connectionParameters:
        # Use the correct IP or host name for the source database
        host: doink-pc
        user: club
        dbname: club
      password:
        name: cluster-club-superuser
        key: password
