# apiVersion: traefik.io/v1alpha1
# kind: IngressRouteTCP
# metadata:
#   name: cnpg-primary-tcp-route
#   namespace: postgres # Same namespace as your CNPG cluster
# spec:
#   entryPoints:
#     - postgres # Must match the name of the TCP entrypoint in your Traefik setup
#   routes:
#     - match: HostSNI(`*`) # Raw TCP without TLS requires a wildcard matching all traffic
#       services:
#         - name: pg-cluster-new-12-rw # Your CNPG primary service name
#           port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    cnpg.io/cluster: pg-cluster-new-12-rw
