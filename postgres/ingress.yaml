apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: cnpg-primary-tcp-route
  namespace: postgres # Same namespace as your CNPG cluster
spec:
  entryPoints:
    - postgres # Must match the name of the TCP entrypoint in your Traefik setup
  routes:
    - match: HostSNI(`*`) # Raw TCP without TLS requires a wildcard matching all traffic
      services:
        - name: pg_cluster_new-10-rw # Your CNPG primary service name
          port: 5432
