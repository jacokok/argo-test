---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
spec:
  # project: openbao
  destination:
    server: https://argocd:6443
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao-app
  namespace: argocd
spec:
  # project: openbao
  destination:
    server: https://argocd:6443
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true

  source:
    repoURL: "https://openbao.github.io/openbao-helm"
    chart: openbao
    targetRevision: 0.28.3
